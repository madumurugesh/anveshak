name: Deploy to EC2 via SSH

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated services to deploy (all,frontend,analytics,anomaly,ingestion,stream)"
        required: false
        default: "all"

env:
  BRANCH: main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine services to deploy
        id: services
        run: |
          INPUT="${{ github.event.inputs.services || 'all' }}"
          if [ "$INPUT" = "all" ]; then
            echo "deploy_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_all=false" >> "$GITHUB_OUTPUT"
            echo "services=$INPUT" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy Nginx configs to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "nginx/*.conf"
          target: "/tmp/anveshak-nginx"
          strip_components: 0

      - name: Deploy services and configure Nginx
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || '5432' }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          ENGINE_SECRET: ${{ secrets.ENGINE_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          EC2_PUBLIC_IP: ${{ secrets.EC2_HOST }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 15m
          envs: DB_HOST,DB_PORT,DB_NAME,DB_USER,DB_PASSWORD,ENGINE_SECRET,OPENAI_API_KEY,AWS_REGION,COGNITO_USER_POOL_ID,COGNITO_CLIENT_ID,ADMIN_EMAIL,ADMIN_PASSWORD,EC2_PUBLIC_IP
          script: |
            set -e

            # ── Helpers ──
            info()  { echo "[INFO]  $1"; }
            warn()  { echo "[WARN]  $1"; }
            error() { echo "[ERROR] $1"; }

            APP_DIR="$HOME/app"
            BRANCH="${{ env.BRANCH }}"
            DEPLOY_ALL="${{ steps.services.outputs.deploy_all }}"
            SERVICES="${{ steps.services.outputs.services }}"
            should_deploy() {
              local svc="$1"
              if [ "$DEPLOY_ALL" = "true" ]; then return 0; fi
              echo ",$SERVICES," | grep -q ",$svc,"
            } 
            # ── 1. Clone or pull repo ──
            info "Syncing repository..."
            mkdir -p "$APP_DIR"
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin "$BRANCH"
              git reset --hard "origin/$BRANCH"
            else
              git clone -b "$BRANCH" "${{ secrets.REPO_URL }}" "$APP_DIR"
              cd "$APP_DIR"
            fi

            # ── 2. System check & pnpm install ──
            command -v node  >/dev/null || { error "Node.js not installed"; exit 1; }
            command -v pm2   >/dev/null || { error "PM2 not installed"; exit 1; }
            command -v nginx >/dev/null || { error "Nginx not installed"; exit 1; }
            command -v pnpm  >/dev/null || sudo npm install -g pnpm

            info "Node $(node -v) | PM2 $(pm2 -v) | pnpm $(pnpm -v)"

            # ── 2b. Write .env files ──
            info "Writing environment files..."

            cat > "$APP_DIR/anveshak/.env" <<EOF
NEXT_PUBLIC_ANALYTICS_API_URL=http://${EC2_PUBLIC_IP}/api/analytics
NEXT_PUBLIC_ANOMALY_API_URL=http://${EC2_PUBLIC_IP}/api/anomaly
NEXT_PUBLIC_ENGINE_SECRET=${ENGINE_SECRET}
NEXT_PUBLIC_COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
NEXT_PUBLIC_COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
NEXT_PUBLIC_ADMIN_EMAIL=${ADMIN_EMAIL}
NEXT_PUBLIC_ADMIN_PASSWORD=${ADMIN_PASSWORD}
NEXT_PUBLIC_USE_MOCK=false
NEXT_PUBLIC_AWS_REGION=${AWS_REGION}
EOF

            cat > "$APP_DIR/analytics/.env" <<EOF
DB_HOST=${DB_HOST}
DB_PORT=${DB_PORT}
DB_NAME=${DB_NAME}
DB_USER=${DB_USER}
DB_PASSWORD=${DB_PASSWORD}
ENGINE_SECRET=${ENGINE_SECRET}
COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
AWS_REGION=${AWS_REGION}
CORS_ORIGINS=http://${EC2_PUBLIC_IP}
NODE_ENV=production
EOF

            cat > "$APP_DIR/aiAnamolyDetection/.env" <<EOF
DB_HOST=${DB_HOST}
DB_PORT=${DB_PORT}
DB_NAME=${DB_NAME}
DB_USER=${DB_USER}
DB_PASSWORD=${DB_PASSWORD}
ENGINE_SECRET=${ENGINE_SECRET}
OPENAI_API_KEY=${OPENAI_API_KEY}
COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
AWS_REGION=${AWS_REGION}
CORS_ORIGINS=http://${EC2_PUBLIC_IP}
NODE_ENV=production
EOF

            cat > "$APP_DIR/ingestion-service/.env" <<EOF
PG_HOST=${DB_HOST}
PG_PORT=${DB_PORT}
PG_DATABASE=${DB_NAME}
PG_USER=${DB_USER}
PG_PASSWORD=${DB_PASSWORD}
AWS_REGION=${AWS_REGION}
EOF

            cat > "$APP_DIR/stream-processing-service/.env" <<EOF
PG_HOST=${DB_HOST}
PG_PORT=${DB_PORT}
PG_DATABASE=${DB_NAME}
PG_USER=${DB_USER}
PG_PASSWORD=${DB_PASSWORD}
AWS_REGION=${AWS_REGION}
ENGINE_SECRET=${ENGINE_SECRET}
ANOMALY_ENGINE_URL=http://127.0.0.1:3002
EOF

            info "Environment files written"

            # ── 3. Deploy Next.js Frontend (port 3000) ──
            if should_deploy "frontend"; then
              info "Deploying frontend (anveshak)..."
              cd "$APP_DIR/anveshak"
              pnpm install --frozen-lockfile
              pnpm build
              pm2 delete anveshak-frontend 2>/dev/null || true
              pm2 start pnpm --name anveshak-frontend --cwd "$APP_DIR/anveshak" -- start
              info "Frontend deployed on port 3000"
            fi

            # ── 4. Deploy Analytics API (port 3001) ──
            if should_deploy "analytics"; then
              info "Deploying analytics..."
              cd "$APP_DIR/analytics"
              pnpm install --frozen-lockfile --prod
              pm2 delete analytics 2>/dev/null || true
              pm2 start server.js --name analytics --cwd "$APP_DIR/analytics"
              info "Analytics deployed on port 3001"
            fi

            # ── 5. Deploy Anomaly Detection API (port 3002) ──
            if should_deploy "anomaly"; then
              info "Deploying anomaly detection..."
              cd "$APP_DIR/aiAnamolyDetection"
              pnpm install --frozen-lockfile --prod
              pm2 delete anomaly-detection 2>/dev/null || true
              pm2 start server.js --name anomaly-detection --cwd "$APP_DIR/aiAnamolyDetection"
              info "Anomaly detection deployed on port 3002"
            fi

            # ── 6. Deploy Ingestion Service (port 8000) ──
            if should_deploy "ingestion"; then
              info "Deploying ingestion service..."
              cd "$APP_DIR/ingestion-service"
              PYTHON_BIN=$(command -v python3.12 || command -v python3)
              if [ ! -d "venv" ]; then
                $PYTHON_BIN -m venv venv
              fi
              source venv/bin/activate
              pip install -q -r requirements.txt
              deactivate
              pm2 delete ingestion-service 2>/dev/null || true
              pm2 start "cd $APP_DIR/ingestion-service && source venv/bin/activate && uvicorn app.main:app --host 127.0.0.1 --port 8000" --name ingestion-service --interpreter bash
              info "Ingestion service deployed on port 8000"
            fi

            # ── 7. Deploy Stream Processing (port 8001) ──
            if should_deploy "stream"; then
              info "Deploying stream processing..."
              cd "$APP_DIR/stream-processing-service"
              PYTHON_BIN=$(command -v python3.12 || command -v python3)
              if [ ! -d "venv" ]; then
                $PYTHON_BIN -m venv venv
              fi
              source venv/bin/activate
              pip install -q -r requirements.txt
              deactivate
              pm2 delete stream-processing 2>/dev/null || true
              pm2 start "cd $APP_DIR/stream-processing-service && source venv/bin/activate && uvicorn app.main:app --host 127.0.0.1 --port 8001" --name stream-processing --interpreter bash
              info "Stream processing deployed on port 8001"
            fi

            # ── 8. Save PM2 process list for reboot persistence ──
            pm2 save
            info "PM2 process list saved"

            # ── 9. Deploy Nginx vhost configs ──
            info "Configuring Nginx virtual hosts..."
            NGINX_CONF_DIR="/etc/nginx/conf.d"
            sudo mkdir -p "$NGINX_CONF_DIR"

            # Remove old anveshak Nginx configs and disable default site
            sudo rm -f "$NGINX_CONF_DIR"/anveshak-*.conf
            sudo rm -f /etc/nginx/sites-enabled/default

            # Copy the single consolidated config
            if [ -d "/tmp/anveshak-nginx/nginx" ]; then
              sudo cp /tmp/anveshak-nginx/nginx/anveshak-frontend.conf "$NGINX_CONF_DIR/"
            elif [ -d "$APP_DIR/nginx" ]; then
              sudo cp "$APP_DIR/nginx/anveshak-frontend.conf" "$NGINX_CONF_DIR/"
            else
              error "Nginx config files not found"
              exit 1
            fi

            # Test and reload Nginx
            sudo nginx -t
            sudo systemctl reload nginx
            info "Nginx configured and reloaded"

            # ── 10. Health checks ──
            info "Running health checks..."
            sleep 5
            for endpoint in \
              "http://127.0.0.1:3000" \
              "http://127.0.0.1:3001/health" \
              "http://127.0.0.1:3002/health" \
              "http://127.0.0.1:8000/health" \
              "http://127.0.0.1:8001/health"; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$endpoint" 2>/dev/null || echo "000")
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
                info "$endpoint -> $STATUS OK"
              else
                warn "$endpoint -> $STATUS (may still be starting)"
              fi
            done

            # Cleanup temp files
            rm -rf /tmp/anveshak-nginx

            info "Deployment complete!"
            pm2 list
